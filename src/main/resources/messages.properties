news.explore=Explore the achievement universe of Gravity Hotel

article.1.title=Gravity Hotel Achieves Record 95% Occupancy in Peak Season
article.1.excerpt=The hotel reports an impressive occupancy rate during the recent holiday season, reflecting strong customer demand.
article.1.content=<p>Gravity Hotel has reached a record-breaking occupancy rate of 95% during the recent peak travel season. This achievement highlights the growing trust from both domestic and international guests.</p><p>Management attributes this success to improved service quality, modern facilities, and a seamless online booking system.</p>

article.2.title=New Infinity Pool Opens with Panoramic City View
article.2.excerpt=Guests can now enjoy a stunning rooftop infinity pool overlooking the entire city skyline view.
article.2.content=<p>Gravity Hotel officially launches its brand-new rooftop infinity pool, offering breathtaking panoramic views of the city.</p><p>The space is designed for relaxation, featuring a poolside bar, ambient lighting, and premium lounge areas.</p>

article.3.title=Gravity Hotel Receives 'Excellent Service Award' 2025
article.3.excerpt=Recognized for outstanding hospitality and customer satisfaction by international travel platforms.
article.3.content=<p>The hotel has been honored with the 'Excellent Service Award 2025' thanks to consistently high ratings from guests worldwide.</p><p>This recognition reinforces Gravity Hotel’s commitment to delivering memorable experiences.</p>

article.4.title=Summer Promotion: Up to 30% Off All Room Types
article.4.excerpt=Special summer deal offering attractive discounts for early bookings with limited-time benefits.
article.4.content=<p>Gravity Hotel introduces a limited-time summer promotion with discounts of up to 30% across all room categories.</p><p>The offer includes complimentary breakfast and flexible cancellation policies for guests booking in advance.</p>

article.5.title=Partnership with Local Tour Providers Enhances Guest Experience
article.5.excerpt=New collaboration allows guests to easily explore top attractions with exclusive deals.
article.5.content=<p>Gravity Hotel has partnered with leading local tour operators to provide curated travel experiences for guests.</p><p>From city tours to cultural excursions, guests can now book activities directly at the hotel with exclusive benefits.</p>

article.6.title=Grand Ballroom Hosts Over 50 Events in First Half of 2025
article.6.excerpt=The hotel’s event space has become a popular choice for conferences, and elegant weddings thanks to its professional service.
article.6.content=<p>The Grand Ballroom at Gravity Hotel has successfully hosted over 50 events, including corporate meetings and luxury weddings.</p><p>Its modern design, advanced lighting system, and professional service team make it a top venue choice.</p>
