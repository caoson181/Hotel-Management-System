service.info1 = Relax with professional spa treatments, aromatherapy, massage sessions, and wellness programs designed to restore your body and mind. Our spa environment is carefully crafted to provide peace, comfort, and premium care throughout your stay.
service.info2 = Enjoy our spacious swimming pool surrounded by a calm and elegant atmosphere, perfect for both relaxation and light exercise. Whether you prefer a refreshing morning swim or a peaceful evening by the water, the pool area offers comfort and tranquility for every guest.
service.info3 = Stay active during your stay with our modern fitness center equipped with high-quality cardio machines, strength-training equipment, and open workout space. Designed for both beginners and experienced users, the facility supports your daily health routine in a comfortable setting.
service.info4 = Experience fine dining with a selection of carefully prepared local and international dishes served in a refined atmosphere. Our restaurant combines elegant presentation, fresh ingredients, and attentive service to create a memorable culinary experience.
