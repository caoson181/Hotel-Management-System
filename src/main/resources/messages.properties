service.spa.menu=Spa
service.spa.title=Luxury Spa & Wellness
service.spa.eyebrow=Wellness Ritual
service.spa.description=Restore your balance with signature massages, herbal rituals, facial treatments, and a private wellness lounge designed for calm, comfort, and deep relaxation.
service.spa.highlight=An elegant retreat for guests who want a slower, more restorative stay.
service.spa.hours=08:00 - 22:00 daily
service.spa.location=Level 2, Wellness Wing
service.spa.paragraph1=Our spa experience blends modern comfort with a peaceful atmosphere for guests seeking recovery, calm, and quiet time away from the pace of travel. Signature therapies, herbal compress rituals, facial care, and private relaxation areas are arranged to make each visit feel unhurried and premium.
service.spa.paragraph2=From solo recovery sessions to couples treatments, every appointment is designed around soft lighting, gentle aromas, and attentive service. The setting works equally well for post-flight relaxation, weekend wellness routines, or a restorative evening after a full day in the city.
service.spa.feature1=Private treatment suites
service.spa.feature2=Signature massage therapies, facial care, and herbal rituals
service.spa.feature3=Relaxation lounge with tea service before and after treatment
service.spa.footnote=Advance reservation is recommended for couples therapy, hot stone sessions, and peak evening hours.
service.pool.menu=Pool
service.pool.title=Swimming Pool
service.pool.eyebrow=Leisure Escape
service.pool.description=Enjoy a refreshing swim in a bright pool environment with sun loungers, calm water, and a resort-like atmosphere that works for both active mornings and relaxed afternoons.
service.pool.highlight=Perfect for a quiet dip, poolside reading, or family leisure time.
service.pool.hours=06:00 - 21:00 daily
service.pool.location=Garden Deck, Ground Floor
service.pool.paragraph1=The swimming pool is designed as an open-air retreat where guests can move between light exercise and slow leisure throughout the day. A clear waterline, wide deck, and comfortable seating create an easy rhythm for morning laps, midday breaks, or a calm sunset swim.
service.pool.paragraph2=Poolside service keeps the space convenient for longer stays, while surrounding greenery softens the atmosphere and gives the area a more private resort character. It is an ideal choice for guests who want both movement and relaxation without leaving the hotel grounds.
service.pool.feature1=Temperature-controlled water
service.pool.feature2=Relaxing poolside lounge chairs
service.pool.feature3=Poolside towels and light refreshment service
service.pool.footnote=Children should be accompanied during busy hours, and guests are encouraged to arrive earlier for the quietest morning experience.
service.gym.menu=Fitness
service.gym.title=Fitness Center
service.gym.eyebrow=Active Stay
service.gym.description=Train with modern cardio machines, free weights, strength equipment, and a well-lit workout floor created to support both quick routines and structured exercise sessions.
service.gym.highlight=A practical, polished space that keeps guests active during their stay.
service.gym.hours=24/7 access
service.gym.location=Level 3, Sports Wing
service.gym.paragraph1=The fitness center combines essential strength and cardio equipment in a clean, well-organized environment that supports both short workouts and full training sessions. Whether guests prefer treadmill intervals, resistance training, or a simple mobility routine, the space remains functional and comfortable throughout the day.
service.gym.paragraph2=Large windows, mirrored walls, and a balanced equipment layout help the room feel open rather than crowded. It is especially suited for business travelers and long-stay guests who want a dependable place to maintain daily exercise habits without interruption.
service.gym.feature1=Modern cardio and resistance equipment
service.gym.feature2=Spacious workout area with natural light
service.gym.feature3=Open-access layout for quick solo routines any time
service.gym.footnote=For the most open floor space, early mornings and mid-afternoons are typically the quietest training periods.
service.restaurant.menu=Restaurant
service.restaurant.title=Fine Dining Restaurant
service.restaurant.eyebrow=Dining Experience
service.restaurant.description=Discover a curated menu of Vietnamese favorites and international classics served in an intimate dining room with attentive service, refined presentation, and a warm evening ambiance.
service.restaurant.highlight=Ideal for breakfast meetings, romantic dinners, or small celebrations.
service.restaurant.hours=06:30 - 22:30 daily
service.restaurant.location=Lobby Level, Main Dining Hall
service.restaurant.paragraph1=Our restaurant presents a dining experience built around polished service, balanced menus, and a setting that feels inviting from morning to late evening. Guests can enjoy a relaxed breakfast, a business lunch, or a more intimate dinner with dishes that combine familiar comfort and refined presentation.
service.restaurant.paragraph2=Seasonal ingredients, chef-led specials, and a carefully arranged dining room help the space suit many occasions without feeling overly formal. The atmosphere is ideal for couples, small groups, and travelers who want a memorable meal close to their room.
service.restaurant.feature1=International and local cuisine
service.restaurant.feature2=Chef-curated signature dishes
service.restaurant.feature3=Private dining available on request
service.restaurant.footnote=Dinner reservations are recommended on weekends, especially for window seating and private dining requests.



