service.spa.menu=Spa
service.spa.title=Luxury Spa & Wellness
service.spa.eyebrow=Nghi thức thư giãn
service.spa.description=Cân bằng lại cơ thể và tinh thần với các liệu pháp massage đặc trưng, nghi thức thảo mộc, chăm sóc da mặt và khu lounge wellness riêng tư được thiết kế cho sự êm dịu và thư thái sâu.
service.spa.highlight=Một không gian thanh lịch dành cho những vị khách muốn tận hưởng nhịp nghỉ ngơi chậm rãi và phục hồi hơn.
service.spa.hours=08:00 - 22:00 hằng ngày
service.spa.location=Tầng 2, khu chăm sóc sức khỏe
service.spa.paragraph1=Trải nghiệm spa của chúng tôi kết hợp sự tiện nghi hiện đại với bầu không khí yên bình dành cho những vị khách tìm kiếm sự hồi phục, tĩnh lặng và khoảng nghỉ tách khỏi nhịp di chuyển bận rộn. Các liệu pháp đặc trưng, nghi thức chườm thảo mộc, chăm sóc da mặt và khu thư giãn riêng được sắp đặt để mỗi lần ghé thăm đều thong thả và cao cấp.
service.spa.paragraph2=Từ những buổi phục hồi cá nhân đến liệu trình đôi, mỗi cuộc hẹn đều được thiết kế với ánh sáng dịu, hương thơm nhẹ và sự chăm chút tận tình. Không gian này phù hợp cho việc thư giãn sau chuyến bay, tái tạo cuối tuần hoặc một buổi tối phục hồi sau ngày dài trong thành phố.
service.spa.feature1=Phòng trị liệu riêng tư
service.spa.feature2=Massage đặc trưng, chăm sóc da mặt và nghi thức thảo mộc
service.spa.feature3=Khu thư giãn với trà phục vụ trước và sau liệu trình
service.spa.footnote=Nên đặt lịch trước cho liệu trình cặp đôi, massage đá nóng và các khung giờ buổi tối cao điểm.
service.pool.menu=Hồ bơi
service.pool.title=Swimming Pool
service.pool.eyebrow=Khoảng thư giãn
service.pool.description=Tận hưởng làn nước mát trong không gian hồ bơi sáng thoáng với ghế nằm tắm nắng, mặt nước êm và cảm giác nghỉ dưỡng phù hợp cho cả buổi sáng năng động lẫn buổi chiều thư thả.
service.pool.highlight=Lý tưởng cho một lần ngâm mình yên tĩnh, đọc sách bên hồ hoặc thời gian thư giãn cùng gia đình.
service.pool.hours=06:00 - 21:00 hằng ngày
service.pool.location=Tầng trệt, khu sân vườn hồ bơi
service.pool.paragraph1=Hồ bơi được thiết kế như một khoảng nghỉ ngoài trời nơi khách có thể chuyển đổi giữa vận động nhẹ và thư giãn chậm rãi suốt cả ngày. Mặt nước trong, sàn hồ rộng và chỗ ngồi thoải mái tạo nên nhịp điệu dễ chịu cho bơi sáng, nghỉ giữa ngày hoặc ngắm hoàng hôn thư thái.
service.pool.paragraph2=Dịch vụ cạnh hồ giúp trải nghiệm thuận tiện hơn cho những lần lưu lại dài, trong khi mảng xanh xung quanh làm không gian riêng tư và đậm chất resort hơn. Đây là lựa chọn lý tưởng cho những ai muốn vừa vận động vừa thư giãn ngay trong khuôn viên khách sạn.
service.pool.feature1=Nước hồ được kiểm soát nhiệt độ
service.pool.feature2=Ghế nghỉ thư giãn cạnh hồ
service.pool.feature3=Khăn hồ bơi và đồ uống nhẹ phục vụ theo yêu cầu
service.pool.footnote=Trẻ em nên có người lớn đi cùng vào giờ đông khách, và khách nên đến sớm để tận hưởng khung giờ buổi sáng yên tĩnh nhất.
service.gym.menu=Fitness
service.gym.title=Fitness Center
service.gym.eyebrow=Kỳ lưu trú năng động
service.gym.description=Tập luyện với máy cardio hiện đại, tạ tự do, thiết bị sức mạnh và khu sàn tập sáng thoáng được tạo nên để hỗ trợ cả các bài tập nhanh lẫn lịch tập bài bản.
service.gym.highlight=Một không gian gọn gàng, thực dụng nhưng chỉn chu để khách luôn duy trì nhịp vận động trong suốt kỳ lưu trú.
service.gym.hours=Phục vụ 24/7
service.gym.location=Tầng 3, khu thể thao
service.gym.paragraph1=Trung tâm thể hình kết hợp đầy đủ thiết bị sức mạnh và cardio trong môi trường sạch sẽ, ngăn nắp, phù hợp cho cả những buổi tập ngắn lẫn các phiên tập hoàn chỉnh. Dù khách thích chạy bộ ngắt quãng, tập kháng lực hay giãn cơ nhẹ nhàng, không gian vẫn luôn tiện dụng và dễ chịu suốt cả ngày.
service.gym.paragraph2=Cửa sổ lớn, tường gương và cách bố trí thiết bị cân đối giúp căn phòng luôn thoáng thay vì chật chội. Không gian này đặc biệt phù hợp với khách doanh nhân và khách lưu trú dài ngày muốn duy trì thói quen rèn luyện đều đặn.
service.gym.feature1=Thiết bị cardio và kháng lực hiện đại
service.gym.feature2=Khu tập rộng với ánh sáng tự nhiên
service.gym.feature3=Không gian mở thuận tiện cho các buổi tập cá nhân bất cứ lúc nào
service.gym.footnote=Muốn có mặt sàn thoáng nhất, bạn nên ghé vào sáng sớm hoặc giữa buổi chiều.
service.restaurant.menu=Nhà hàng
service.restaurant.title=Fine Dining Restaurant
service.restaurant.eyebrow=Trải nghiệm ẩm thực
service.restaurant.description=Khám phá thực đơn chọn lọc gồm món Việt quen thuộc và món quốc tế kinh điển trong phòng ăn ấm cúng với phong cách phục vụ tận tâm, trình bày tinh tế và bầu không khí buổi tối đầy cảm xúc.
service.restaurant.highlight=Phù hợp cho bữa sáng gặp gỡ đối tác, bữa tối lãng mạn hoặc những dịp kỷ niệm nhỏ.
service.restaurant.hours=06:30 - 22:30 hằng ngày
service.restaurant.location=Tầng sảnh, khu nhà hàng chính
service.restaurant.paragraph1=Nhà hàng mang đến trải nghiệm ẩm thực được xây dựng từ phong cách phục vụ chỉn chu, thực đơn cân bằng và không gian thân thiện từ sáng đến tối muộn. Khách có thể tận hưởng bữa sáng thong thả, bữa trưa công việc hoặc bữa tối riêng tư với những món ăn kết hợp giữa sự quen thuộc và cách trình bày tinh tế.
service.restaurant.paragraph2=Nguyên liệu theo mùa, món đặc biệt do đầu bếp đề xuất và cách bài trí phòng ăn cẩn thận giúp nơi đây phù hợp với nhiều dịp mà không trở nên quá kiểu cách. Bầu không khí rất hợp cho cặp đôi, nhóm nhỏ và du khách muốn có một bữa ăn đáng nhớ ngay gần phòng nghỉ.
service.restaurant.feature1=Ẩm thực quốc tế và địa phương
service.restaurant.feature2=Món đặc trưng do đầu bếp tuyển chọn
service.restaurant.feature3=Có thể phục vụ bữa ăn riêng theo yêu cầu
service.restaurant.footnote=Nên đặt bàn trước vào cuối tuần, đặc biệt nếu bạn muốn chỗ ngồi gần cửa sổ hoặc không gian riêng.
