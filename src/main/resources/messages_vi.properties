# ===== ROOM DESCRIPTIONS =====
room.standard.single.desc=Phòng nhỏ gọn, tiện nghi với giường đơn thoải mái. Lý tưởng cho khách đi một mình.
room.standard.double.desc=Phòng ấm cúng với giường đôi. Trang bị đầy đủ tiện nghi cần thiết cho kỳ nghỉ dễ chịu.
room.standard.twin.desc=Hai giường đơn thoải mái. Phù hợp cho bạn bè hoặc đồng nghiệp đi cùng nhau.

room.superior.single.desc=Phòng đơn rộng rãi với tiện nghi nâng cấp và tầm nhìn ra thành phố.
room.superior.double.desc=Phòng thoáng sáng với giường cỡ queen và bàn làm việc.
room.superior.twin.desc=Hai giường đơn dài hơn tiêu chuẩn với chăn ga cao cấp và khu vực ngồi thư giãn.
room.superior.triple.desc=Phù hợp cho gia đình nhỏ: một giường đôi và một giường đơn.

room.deluxe.double.desc=Phòng rộng rãi với giường king-size, phòng tắm sang trọng và tầm nhìn toàn cảnh thành phố.
room.deluxe.twin.desc=Hai giường queen-size cùng tiện nghi cao cấp và phòng tắm riêng biệt.
room.deluxe.family.desc=Một giường king và hai giường đơn. Có khu sinh hoạt riêng và phòng tắm cao cấp.

room.executive.double.desc=Thiết kế dành cho khách doanh nhân với không gian làm việc tiện nghi và quyền sử dụng lounge cao cấp.
room.executive.twin.desc=Hai giường đơn cao cấp với khu vực làm việc riêng. Bao gồm quyền sử dụng executive lounge.

room.suite.junior.desc=Phòng ngủ và phòng khách riêng biệt. Tầm nhìn toàn cảnh thành phố cùng dịch vụ quản gia.
room.suite.presidential.desc=Hai phòng ngủ, phòng khách và phòng ăn riêng. Trải nghiệm nghỉ dưỡng đẳng cấp tối thượng.

