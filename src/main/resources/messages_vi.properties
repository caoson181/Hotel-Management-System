# ABOUT PAGE
about.desc3=Được thành lập vào năm 2020, Gravity Hotel nhanh chóng trở thành điểm đến hàng đầu dành cho những du khách sành điệu. Cam kết về sự xuất sắc của chúng tôi được thể hiện trong mọi khía cạnh dịch vụ, từ khi bạn đến cho đến lúc rời đi.
about.text1=Đội ngũ nhân viên tận tâm của chúng tôi luôn sẵn sàng cung cấp dịch vụ cá nhân hóa phù hợp với nhu cầu của bạn. Từ dịch vụ lễ tân đến phục vụ phòng 24/7, chúng tôi nỗ lực mang đến cho bạn một kỳ nghỉ thoải mái và đáng nhớ nhất.
about.text2=Trải nghiệm sự kết hợp hoàn hảo giữa sang trọng, tiện nghi và đổi mới tại Zero Gravity Hotel. Chúng tôi mong được chào đón bạn đến với thế giới dịch vụ đẳng cấp của mình.
