article.1.title=Gravity Hotel đạt tỷ lệ lấp đầy kỷ lục 95% trong mùa cao điểm
article.1.excerpt=Khách sạn báo cáo tỷ lệ lấp đầy ấn tượng trong mùa lễ gần đây, phản ánh nhu cầu mạnh mẽ từ khách hàng.
article.1.content=<p>Gravity Hotel đã đạt tỷ lệ lấp đầy kỷ lục 95% trong mùa du lịch cao điểm gần đây. Thành tựu này cho thấy sự tin tưởng ngày càng tăng từ cả khách nội địa và quốc tế.</p><p>Ban quản lý cho rằng thành công này đến từ việc cải thiện chất lượng dịch vụ, cơ sở vật chất hiện đại và hệ thống đặt phòng trực tuyến liền mạch.</p>

article.2.title=Hồ bơi vô cực mới khai trương với tầm nhìn toàn cảnh thành phố
article.2.excerpt=Khách giờ đây có thể tận hưởng hồ bơi vô cực trên sân thượng tuyệt đẹp với tầm nhìn bao quát toàn bộ đường chân trời của thành phố.
article.2.content=<p>Gravity Hotel chính thức ra mắt hồ bơi vô cực mới trên sân thượng, mang đến tầm nhìn toàn cảnh ngoạn mục của thành phố.</p><p>Khu vực được thiết kế để thư giãn, với quầy bar cạnh hồ bơi, ánh sáng dịu và khu vực ghế nằm cao cấp.</p>

article.3.title=Gravity Hotel nhận giải thưởng 'Excellent Service Award' 2025
article.3.excerpt=Được công nhận về dịch vụ xuất sắc và sự hài lòng của khách hàng bởi các nền tảng du lịch quốc tế.
article.3.content=<p>Khách sạn đã được vinh danh với giải thưởng 'Excellent Service Award 2025' nhờ vào các đánh giá cao liên tục từ khách hàng trên toàn thế giới.</p><p>Sự công nhận này củng cố cam kết của Gravity Hotel trong việc mang đến những trải nghiệm đáng nhớ.</p>

article.4.title=Khuyến mãi mùa hè: Giảm đến 30% cho tất cả các loại phòng
article.4.excerpt=Ưu đãi mùa hè đặc biệt với mức giảm giá hấp dẫn cho đặt phòng sớm cùng các lợi ích trong thời gian có hạn.
article.4.content=<p>Gravity Hotel giới thiệu chương trình khuyến mãi mùa hè có thời hạn với mức giảm giá lên đến 30% cho tất cả các hạng phòng.</p><p>Ưu đãi bao gồm bữa sáng miễn phí và chính sách hủy linh hoạt cho khách đặt phòng trước.</p>

article.5.title=Hợp tác với các nhà cung cấp tour địa phương nâng cao trải nghiệm khách hàng
article.5.excerpt=Sự hợp tác mới cho phép khách dễ dàng khám phá các điểm tham quan hàng đầu với các ưu đãi độc quyền.
article.5.content=<p>Gravity Hotel đã hợp tác với các nhà điều hành tour địa phương hàng đầu để cung cấp các trải nghiệm du lịch được tuyển chọn cho khách.</p><p>Từ các tour thành phố đến các chuyến tham quan văn hóa, khách giờ đây có thể đặt hoạt động trực tiếp tại khách sạn với các lợi ích độc quyền.</p>

article.6.title=Grand Ballroom tổ chức hơn 50 sự kiện trong nửa đầu năm 2025
article.6.excerpt=Không gian sự kiện của khách sạn đã trở thành lựa chọn phổ biến cho hội nghị và các đám cưới sang trọng nhờ dịch vụ chuyên nghiệp.
article.6.content=<p>Grand Ballroom tại Gravity Hotel đã tổ chức thành công hơn 50 sự kiện, bao gồm hội nghị doanh nghiệp và đám cưới cao cấp.</p><p>Thiết kế hiện đại, hệ thống ánh sáng tiên tiến và đội ngũ phục vụ chuyên nghiệp khiến nơi đây trở thành lựa chọn hàng đầu cho địa điểm tổ chức sự kiện.</p>
