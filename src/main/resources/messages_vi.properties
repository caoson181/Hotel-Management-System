about.desc1=Gravity Hotel mang đến trải nghiệm sang trọng và yên bình bậc nhất. Nằm ngay trung tâm thành phố, khách sạn kết hợp kiến trúc hiện đại với không gian thư thái.
about.desc2=Chúng tôi cung cấp phòng rộng rãi, spa cao cấp, ẩm thực tinh tế và phòng gym hiện đại. Dù là công việc hay nghỉ dưỡng, mọi khoảnh khắc đều đáng nhớ.
