<div th:fragment="modals">
  <!-- PROFILE MODAL -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="closeProfileModal">&times;</span>

      <h2>Profile</h2>

      <div class="profile-info">
        <p>
          <strong>Name:</strong> <span th:text="${currentUser.fullName}"></span>
        </p>
        <p>
          <strong>Role:</strong> <span th:text="${currentUser.role}"></span>
        </p>
        <p>
          <strong>Email:</strong> <span th:text="${currentUser.email}"></span>
        </p>
      </div>
    </div>
  </div>

  <!-- PASSWORD MODAL -->
  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="closeModal">&times;</span>

      <h2>Change Password</h2>

      <label>Current Password</label>
      <input type="password" placeholder="Enter current password" />

      <label>New Password</label>
      <input type="password" placeholder="Enter new password" />

      <label>Confirm New Password</label>
      <input type="password" placeholder="Confirm new password" />

      <button>Update Password</button>
    </div>
  </div>
</div>
