<aside class="admin-sidebar" th:fragment="navbar" xmlns:sec="http://www.w3.org/1999/xhtml">
  <div class="admin-sidebar__brand">
    <a th:href="@{/index}" class="logo-link brand-link">
      <img src="/images/gravity-logo-chatgpt-cutout.png" alt="Gravity Hotel logo" class="brand-logo brand-logo-admin" />
      <div class="brand-copy">
        <strong>Hotel Admin</strong>
        <span>Staff Workspace</span>
      </div>
    </a>
  </div>

  <div class="admin-sidebar__nav">
    <div class="sidebar-group">
      <span class="sidebar-group__label">Overview</span>
      <a th:href="@{/index}" class="sidebar-link" id="dashboardLink">
        <i class="fas fa-house"></i>
        <span>Dashboard</span>
      </a>
      <a th:href="@{/staff/tasks/my}" class="sidebar-link" id="myTasks">
        <i class="fas fa-list-check"></i>
        <span>My Tasks</span>
      </a>
      <a th:href="@{/staff/tasks/manage}" class="sidebar-link" id="manageTasks" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
        <i class="fas fa-clipboard-list"></i>
        <span>Manage Tasks</span>
      </a>
    </div>

    <div class="sidebar-group">
      <span class="sidebar-group__label">Rooms</span>
      <a th:href="@{/rooms/view-room-status}" class="sidebar-link" id="viewRoomStatus" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
        <i class="fas fa-bed"></i>
        <span>Room Status</span>
      </a>
      <a th:href="@{/rooms/view-room}" class="sidebar-link" id="viewRoom">
        <i class="fas fa-door-open"></i>
        <span>View Room</span>
      </a>
      <a th:href="@{/rooms/check-equipment}" class="sidebar-link" id="checkEquipment" sec:authorize="hasAnyRole('HOUSEKEEPER','MANAGER')">
        <i class="fas fa-screwdriver-wrench"></i>
        <span>Check Equipment</span>
      </a>
    </div>

    <div class="sidebar-group">
      <span class="sidebar-group__label">People</span>
      <a th:href="@{/staff/view}" class="sidebar-link" id="viewStaff">
        <i class="fas fa-id-badge"></i>
        <span>View Staff</span>
      </a>
      <a th:href="@{/staff/manage}" class="sidebar-link" id="manageStaff" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
        <i class="fas fa-users-gear"></i>
        <span>Manage Staff</span>
      </a>
      <a th:href="@{/users/manage}" class="sidebar-link" id="manageUsers" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
        <i class="fas fa-user-group"></i>
        <span>Manage Users</span>
      </a>
    </div>

    <div class="sidebar-group" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
      <span class="sidebar-group__label">Business</span>
      <a th:href="@{/revenue/view-revenue}" class="sidebar-link" id="viewRevenue">
        <i class="fas fa-chart-line"></i>
        <span>Revenue</span>
      </a>
      <a th:href="@{/reports/view-reports}" class="sidebar-link" id="viewReports">
        <i class="fas fa-file-lines"></i>
        <span>Reports</span>
      </a>
    </div>
  </div>

  <div class="account" id="accountMenu">
    <div class="avatar">
      <img th:if="${avatarNavbar != null}" th:src="${avatarNavbar.url}" alt="Avatar" />
      <span th:if="${avatarNavbar == null}" th:text="${#strings.substring(currentUser.fullName,0,1)}"></span>
    </div>

    <div class="account-copy">
      <div class="account-name" th:text="${currentUser.fullName}"></div>
      <div class="account-role" th:text="${currentUser.role}"></div>
    </div>
    <div class="dropdown-icon">&#9662;</div>

    <div class="account-dropdown" id="dropdownMenu">
      <a th:href="@{/staff/profile}">Profile</a>
      <a id="changePasswordBtn">Change Password</a>

      <form action="/logout" method="post" style="margin: 0">
        <button type="submit" style="display:block;width:100%;padding:12px 15px;text-align:left;background:none;border:none;color:#333;font-size:14px;cursor:pointer;">
          Logout
        </button>
      </form>

      <button id="secretBtn" style="display: none;">HTMG</button>
    </div>
  </div>
</aside>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("admin-shell");

    const currentPath = window.location.pathname;
    document.querySelectorAll(".sidebar-link").forEach((link) => {
      const href = link.getAttribute("href");
      if (href && currentPath === href) {
        link.classList.add("is-active");
      }
    });

    document.querySelectorAll(".toggle-password").forEach(icon => {
      icon.addEventListener("click", () => {
        const input = document.getElementById(icon.getAttribute("data-target"));

        if (input.type === "password") {
          input.type = "text";
          icon.textContent = "??";
        } else {
          input.type = "password";
          icon.textContent = "??";
        }
      });
    });

    const newPasswordInput = document.getElementById("newPassword");
    const strengthText = document.getElementById("passwordStrength");

    if (newPasswordInput && strengthText) {
      newPasswordInput.addEventListener("input", () => {
        const value = newPasswordInput.value;

        let strength = "";
        let color = "";

        if (value.length < 6) {
          strength = "Weak";
          color = "red";
        } else if (value.match(/[A-Z]/) && value.match(/[0-9]/) && value.length >= 8) {
          strength = "Strong";
          color = "green";
        } else {
          strength = "Medium";
          color = "orange";
        }

        strengthText.textContent = "Strength: " + strength;
        strengthText.style.color = color;
      });
    }

    const passwordModal = document.getElementById("passwordModal");
    const editModal = document.getElementById("editProfileModal");

    const hasPasswordMessage =
      document.querySelector(".success-message.password-message") ||
      document.querySelector(".error-message.password-message");

    if (hasPasswordMessage && passwordModal) {
      passwordModal.classList.add("show");
    }

    const editBtn = document.getElementById("openEditModal");
    const editClose = document.getElementById("closeEditModal");

    if (editModal && editBtn && editClose) {
      editBtn.onclick = () => editModal.classList.add("show");
      editClose.onclick = () => editModal.classList.remove("show");
    }

    window.addEventListener("click", (e) => {
      if (passwordModal && e.target === passwordModal) {
        passwordModal.classList.remove("show");
      }
      if (editModal && e.target === editModal) {
        editModal.classList.remove("show");
      }
    });

    const form = document.getElementById("changePasswordForm");

    if (form) {
      form.addEventListener("submit", function (e) {
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const strengthText = document.getElementById("passwordStrength");
        const clientError = document.getElementById("clientError");

        if (clientError) clientError.style.display = "none";

        if (strengthText && strengthText.textContent.includes("Weak")) {
          e.preventDefault();
          if (clientError) {
            clientError.textContent = "Password is too weak!";
            clientError.style.display = "block";
          }
          return;
        }

        if (newPassword !== confirmPassword) {
          e.preventDefault();
          if (clientError) {
            clientError.textContent = "Passwords do not match!";
            clientError.style.display = "block";
          }
        }
      });
    }

    const secretBtn = document.getElementById("secretBtn");

    if (secretBtn) {
      secretBtn.addEventListener("click", () => {
        window.open("https://youtu.be/9gIMZ0WyY88?si=9eZVdRkWb3WH6Sfq", "_blank");
      });

      document.addEventListener("keydown", (e) => {
        if (e.altKey) {
          secretBtn.style.display = "block";
        }
      });

      document.addEventListener("keyup", (e) => {
        if (!e.altKey) {
          secretBtn.style.display = "none";
        }
      });

      window.addEventListener("blur", () => {
        secretBtn.style.display = "none";
      });
    }
  });
</script>
