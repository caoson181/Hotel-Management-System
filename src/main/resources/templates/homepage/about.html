<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Gravity Hotel</title>
  <link rel="stylesheet" th:href="@{/css/homepage.css}" />
  <link rel="stylesheet" th:href="@{/css/about.css}" />
  <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />
  <link
          rel="stylesheet"
          href="https://unpkg.com/swiper/swiper-bundle.min.css"
  />
</head>
<body class="light-bg">
<div th:replace="homepage/navbar :: navbar"></div>
<br /><br /><br />
<!-- About Section -->
<section id="about" class="about">
  <div class="container">
    <!-- Top Section: Text Left, Image Right -->
    <div class="about-top">
      <div class="about-text">
        <h2 th:text="#{about.title}"></h2>
        <p th:text="#{about.desc1}"></p>
        <p th:text="#{about.desc2}"></p>
        <p th:text="#{about.desc3}"></p>
      </div>
      <div class="about-image">
        <img th:src="@{/images/slide4.jpg}"
             alt="Zero Gravity Hotel Exterior"
        />
      </div>
    </div>

    <!-- Bottom Section: Image Left, Text Right -->
    <div class="about-bottom">
      <div class="about-image">
        <img th:src="@{/images/slide1.jpg}"
             alt="Zero Gravity Hotel Interior"
        />
      </div>
      <div class="about-text">
        <p th:text="#{about.text1}"></p>
        <p th:text="#{about.text2}"></p>
        <a href="/contact" class="cta-button" th:text="#{about.contact}"></a>
      </div>
    </div>
  </div>
</section>

<!-- Gallery Section -->
<section class="gallery">
  <div class="container">
    <h2 th:text="#{about.gallery}"></h2>
    <div class="swiper-container gallery-swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img th:src="@{/images/slide1.jpg}" alt="Hotel Room" />
        </div>
        <div class="swiper-slide">
          <img th:src="@{/images/slide2.jpg}" alt="Spa" />
        </div>
        <div class="swiper-slide">
          <img th:src="@{/images/slide3.jpg}" alt="Dining" />
        </div>
        <div class="swiper-slide">
          <img th:src="@{/images/slide4.jpg}" alt="Exterior" />
        </div>
      </div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <p th:text="#{footer.copy}"></p>
  </div>
</footer>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
  // Load navbar
  fetch("navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-placeholder").innerHTML = data;

            // Add scroll effect for navbar
            const header = document.querySelector(".header");
            window.addEventListener("scroll", () => {
              if (window.scrollY > 50) {
                header.classList.add("scrolled");
              } else {
                header.classList.remove("scrolled");
              }
            });
          });

  // Initialize Gallery Swiper
  const gallerySwiper = new Swiper(".gallery-swiper", {
    loop: true,
    speed: 600,
    autoplay: {
      delay: 4000,
      disableOnInteraction: false,
    },
    pagination: {
      el: ".swiper-pagination",
      clickable: true,
    },
    navigation: {
      nextEl: ".swiper-button-next",
      prevEl: ".swiper-button-prev",
    },
    slidesPerView: 1,
    spaceBetween: 20,
    breakpoints: {
      768: {
        slidesPerView: 2,
      },
      1024: {
        slidesPerView: 3,
      },
    },
  });

  // Fade-in animation for paragraphs
  const observerOptions = {
    threshold: 0.1,
    rootMargin: "0px 0px -50px 0px",
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("fade-in");
      }
    });
  }, observerOptions);

  document.querySelectorAll(".about-text p").forEach((p) => {
    observer.observe(p);
  });
</script>
</body>
</html>
