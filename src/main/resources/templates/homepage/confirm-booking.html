<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/confirm-booking.css" />

</head>
<body>
<div class="container">


    <!-- LEFT PANEL -->
    <div class="left">
        <h2>Confirm Booking</h2>

        <div class="info-box">
            <p><strong>Room:</strong> <span id="roomInfo"></span></p>
            <p><strong>Check-in:</strong> <span id="checkin"></span></p>
            <p><strong>Check-out:</strong> <span id="checkout"></span></p>
        </div>

        <div class="actions">
            <button id="confirmBtn" class="btn primary">Confirm</button>
            <button onclick="history.back()" class="btn">Cancel</button>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <h3>Available Rooms</h3>
        <div id="roomList" class="room-grid"></div>
    </div>
</div>
</body>
<script src="/js/confirm-booking.js"></script>
</html>
