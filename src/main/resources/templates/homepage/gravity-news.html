<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gravity Hotel | Achievement Solar System</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/homepage.css" />
    <link rel="stylesheet" th:href="@{/css/gravity-news.css}" /></head>
<body>
<div th:replace="~{homepage/navbar :: navbar}"></div>



<div class="solar-cosmic-bg"></div>
<div class="solar-stars" id="solarStarsContainer"></div>
<div class="solar-scroll-progress" id="solarScrollProgress"></div>

<div class="solar-header-section">
    <h1>
        <i class="fas fa-gravity"></i>
        <span th:text="#{solar.title}">ACHIEVEMENT SYSTEM</span>
    </h1>
    <p th:text="#{solar.subtitle}">
        Planets of excellence orbiting Gravity Hotel
    </p>

<div class="solar-control-wrapper">
    <button class="solar-pause-play-btn" id="solarToggleOrbitBtn">
        <i class="fas fa-pause"></i>
    <span th:text="#{solar.pause}">Pause Orbits</span>

    </button>
</div>

<div class="solar-system-container">
    <div class="solar-orbit-boundary">
        <div class="solar-orbit-system" id="solarOrbitSystem">
            <div class="solar-gravity-center">
                <i class="fas fa-hotel"></i>
                <h3>GRAVITY</h3>
                <p>HOTEL</p>
            </div>
        </div>
    </div>
</div>

<div class="solar-news-section">
    <div class="solar-filter-bar">
        <button class="solar-filter-btn active" data-filter="all">
  <i class="fas fa-globe"></i>
  <span th:text="#{filter.all}">All</span>
</button>

<button class="solar-filter-btn" data-filter="achievement">
  <i class="fas fa-trophy"></i>
  <span th:text="#{filter.achievement}">Achievements</span>
</button>

<button class="solar-filter-btn" data-filter="news">
  <i class="fas fa-newspaper"></i>
  <span th:text="#{filter.news}">News</span>
</button>

<button class="solar-filter-btn" data-filter="event">
  <i class="fas fa-calendar-alt"></i>
  <span th:text="#{filter.event}">Events</span>
</button>
    </div>
    <div class="solar-news-grid" id="solarNewsGrid"></div>
</div>

<div id="solarDetailModal" class="solar-detail-overlay">
    <div class="solar-detail-container">
        <button class="solar-close-detail" id="solarCloseModalBtn"><i class="fas fa-times"></i></button>
        <div id="solarDetailDynamicContent"></div>
    </div>
</div>

<footer class="solar-footer">
    <i class="fas fa-gravity"></i> <span th:text="#{solar.footer}">
        Gravity Hotel — Where achievements orbit around excellence
    </span>
</footer>

<!-- I18N for JS -->
<script th:inline="javascript">
    const i18n = {
        achievement: /*[[#{filter.achievement}]]*/ "Achievements",
        news: /*[[#{filter.news}]]*/ "News",
        event: /*[[#{filter.event}]]*/ "Events",

        readMore: /*[[#{news.readMore}]]*/ "Read More",
        explore: /*[[#{news.explore}]]*/ "Explore...",

        pause: /*[[#{solar.pause}]]*/ "Pause Orbits",
        play: /*[[#{solar.play}]]*/ "Start Orbits",

        modalFooter: /*[[#{solar.modalFooter}]]*/ "Where excellence defies gravity"
    };
    const i18nArticles = {
        "article.1.title": /*[[#{article.1.title}]]*/ "",
        "article.1.excerpt": /*[[#{article.1.excerpt}]]*/ "",
        "article.1.content": /*[[#{article.1.content}]]*/ "",

        "article.2.title": /*[[#{article.2.title}]]*/ "",
        "article.2.excerpt": /*[[#{article.2.excerpt}]]*/ "",
        "article.2.content": /*[[#{article.2.content}]]*/ "",

        "article.3.title": /*[[#{article.3.title}]]*/ "",
        "article.3.excerpt": /*[[#{article.3.excerpt}]]*/ "",
        "article.3.content": /*[[#{article.3.content}]]*/ "",

        "article.4.title": /*[[#{article.4.title}]]*/ "",
        "article.4.excerpt": /*[[#{article.4.excerpt}]]*/ "",
        "article.4.content": /*[[#{article.4.content}]]*/ "",

        "article.5.title": /*[[#{article.5.title}]]*/ "",
        "article.5.excerpt": /*[[#{article.5.excerpt}]]*/ "",
        "article.5.content": /*[[#{article.5.content}]]*/ "",

        "article.6.title": /*[[#{article.6.title}]]*/ "",
        "article.6.excerpt": /*[[#{article.6.excerpt}]]*/ "",
        "article.6.content": /*[[#{article.6.content}]]*/ ""
    };
</script>

<!-- Custom JS -->
    <script th:src="@{/js/gravity-news.js}"></script>
    <script th:src="@{/js/homepage.js}"></script>
</body>
</html>
