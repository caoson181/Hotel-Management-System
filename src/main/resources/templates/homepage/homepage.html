<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Hotel - Homepage</title>

    <!-- Local CSS -->
    <link rel="stylesheet" href="/css/homepage.css" />
    <link rel="stylesheet" href="/css/customer-theme.css" />
    <link rel="stylesheet" href="/css/room-card.css" />
    <link rel="stylesheet" href="/css/customer-footer.css" />

    <!-- External CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css"
    />
  </head>

  <body>
    <!-- Navbar (Thymeleaf fragment) -->
    <div th:replace="homepage/navbar :: navbar"></div>

    <div id="tierUpgradeOverlay" class="tier-upgrade-overlay hidden">
      <div class="tier-upgrade-backdrop"></div>
      <div class="tier-upgrade-modal">
        <button id="closeTierUpgrade" class="tier-upgrade-close" type="button">
          <i class="fas fa-times"></i>
        </button>
        <div class="tier-upgrade-icon">
          <i class="fas fa-crown"></i>
        </div>
        <p class="tier-upgrade-label">Membership Upgrade</p>
        <h2>Congratulations!</h2>
        <p id="tierUpgradeMessage" class="tier-upgrade-message"></p>
      </div>
      <div id="tierConfetti" class="tier-confetti"></div>
    </div>

    <!-- Hero Section with Slider -->
    <section id="home" class="hero">
      <div class="swiper-container">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <div class="slide-content">
              <img
                src="/images/slide1.jpg"
                alt="Luxury Hotel Room"
                class="hero-image"
              />
              <div class="overlay"></div>

              <div class="hero-text">
                <h2 class="typing-effect" th:text="#{hero.welcome}"></h2>
                <p th:text="#{hero.desc}"></p>
                <a href="rooms" class="cta-button" th:text="#{hero.book}"></a>
              </div>
            </div>
          </div>

          <div class="swiper-slide">
            <div class="slide-content">
              <img
                src="/images/slide2.jpg"
                alt="Spa Treatment"
                class="hero-image"
              />
              <div class="overlay"></div>

              <div class="hero-text">
                <h2 th:text="#{hero.spa.title}"></h2>
                <p th:text="#{hero.spa.desc}"></p>
                <a
                  href="services"
                  class="cta-button"
                  th:text="#{hero.spa.btn}"
                ></a>
              </div>
            </div>
          </div>

          <div class="swiper-slide">
            <div class="slide-content">
              <img
                src="/images/slide3.jpg"
                alt="Dining Experience"
                class="hero-image"
              />
              <div class="overlay"></div>

              <div class="hero-text">
                <h2 th:text="#{hero.food.title}"></h2>
                <p th:text="#{hero.food.desc}"></p>
                <a
                  href="contact"
                  class="cta-button"
                  th:text="#{hero.food.btn}"
                ></a>
              </div>
            </div>
          </div>
        </div>

        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
      </div>
    </section>

    <!-- About Section -->
    <section class="about">
      <div class="container">
        <div class="about-content">
          <div class="about-text">
            <h2 th:text="#{about.title}"></h2>

            <p th:text="#{about.desc1}"></p>
            <p th:text="#{about.desc2}"></p>

            <a href="/about" class="cta-button" th:text="#{about.btn}"></a>
          </div>

          <div class="about-image">
            <img src="/images/slide7.jpg" alt="Zero Gravity Hotel Exterior" />
          </div>
        </div>
      </div>
    </section>

    <!-- Room rank (between About and Bookshelf) -->
    <!-- SECTION: Hiển thị 5 hạng phòng với background full -->
    <!-- SECTION: Full width room showcase - Safe for other sections -->
    <section class="nesta-room-showcase" id="nestaRoomShowcase">
      <div class="showcase-card" id="showcaseCard">
        <div class="card-background" id="dynamicBg"></div>
        <div class="card-overlay"></div>

        <div class="card-content">
          <!-- HỘI THẢO VÀ SỰ KIỆN -->
          <div class="event-header">
            <h2 th:text="#{room.category}"></h2>

            <!--                <span class="slogan">Nesta The Grand Hào Nam · tinh tế</span>-->
          </div>

          <!-- Room Info -->
          <div class="featured-room">
            <div class="featured-info">
              <div class="room-category" id="roomRankLabel">PREMIER</div>
              <h3 id="roomTitle">Premier Skyline</h3>
              <div class="basic-info" id="basicInfoList"></div>
              <button class="detail-btn" id="openModalBtn">
                <span th:text="#{room.detail}"></span>
                <i class="fas fa-arrow-right"></i>
              </button>
            </div>
          </div>

          <!-- Thumbnails -->
          <div class="thumbnail-strip" id="thumbStrip"></div>
        </div>
      </div>

      <!-- Modal -->
      <div class="modal" id="roomModal"></div>
    </section>

    <section class="bookshelf-section">
      <br /><br />
      <div class="container">
        <h2 class="bookshelf-title" th:text="#{service.title}"></h2>
        <!-- hoặc tiếng Việt: Dịch Vụ Nổi Bật -->
      </div>

      <div class="book-shelf" id="bookShelf"></div>
    </section>

    <!-- Floating Elements -->
    <div class="floating-elements">
      <div class="floating-circle"></div>
      <div class="floating-circle"></div>
      <div class="floating-circle"></div>
    </div>

    <!-- Footer -->
    <div th:replace="~{homepage/customer-footer :: customerFooter}"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="/js/homepage.js"></script>
    <!-- Room card JavaScript -->
    <script src="/js/room-card.js"></script>

    <script>
      // Navbar scroll effect
      const header = document.querySelector(".header");

      window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
      });

      (async function initTierUpgradePopup() {
        const overlay = document.getElementById("tierUpgradeOverlay");
        const closeBtn = document.getElementById("closeTierUpgrade");
        const message = document.getElementById("tierUpgradeMessage");
        const confetti = document.getElementById("tierConfetti");
        if (!overlay) {
          return;
        }

        let payload;
        try {
          const response = await fetch("/profile/tier-upgrade/status", {
            headers: { "X-Requested-With": "XMLHttpRequest" },
          });
          const contentType = response.headers.get("content-type") || "";
          if (!response.ok || !contentType.includes("application/json")) {
            return;
          }
          payload = await response.json();
        } catch (error) {
          return;
        }

        if (!payload?.show) {
          return;
        }

        const memberLevel = payload.memberLevel || "Silver";
        const customerRank = payload.customerRank || "VIP";
        message.textContent = `You have been upgraded to ${memberLevel} / ${customerRank}. Enjoy your new member privileges.`;
        overlay.classList.remove("hidden");

        for (let i = 0; i < 36; i += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti-piece";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.animationDelay = `${Math.random() * 0.7}s`;
          piece.style.background = ["#d4af37", "#ff6b6b", "#4ecdc4", "#667eea"][i % 4];
          confetti.appendChild(piece);
        }

        function closePopup() {
          overlay.classList.add("hidden");
          confetti.innerHTML = "";
          fetch("/profile/tier-upgrade/ack", { method: "POST" }).catch(() => {});
        }

        closeBtn?.addEventListener("click", closePopup);
        overlay.addEventListener("click", (event) => {
          if (event.target === overlay || event.target.classList.contains("tier-upgrade-backdrop")) {
            closePopup();
          }
        });
      })();
    </script>
  </body>
</html>
