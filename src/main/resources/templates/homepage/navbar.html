<div
  th:fragment="navbar"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <header class="header">
    <nav th:fragment="navbar" class="navbar">
      <div class="logo">
        <h1>
          <a th:href="@{/}" class="nav-link">Gravity Hotel</a>
        </h1>
      </div>

      <ul class="nav-links">
        <li>
          <a
            th:href="@{/rooms}"
            th:text="${#locale.language == 'vi'} ? 'Phòng' : 'Rooms'"
            class="nav-link"
          ></a>
        </li>
        <li>
          <a
            th:href="@{/services}"
            th:text="${#locale.language == 'vi'} ? 'Dịch vụ' : 'Services'"
            class="nav-link"
          ></a>
        </li>
        <li>
          <a
            th:href="@{/about}"
            th:text="${#locale.language == 'vi'} ? 'Giới thiệu' : 'About'"
            class="nav-link"
          ></a>
        </li>
        <li>
          <a
            th:href="@{/gravity-news}"
            th:text="${#locale.language == 'vi'} ? 'Tin tức' : 'News'"
            class="nav-link"
          ></a>
        </li>
        <li>
          <a
            th:href="@{/contact}"
            th:text="${#locale.language == 'vi'} ? 'Liên hệ' : 'Contact'"
            class="nav-link"
          ></a>
        </li>
        <li class="language-parent nav-item-compact" id="languageBtn">
          <button class="account-btn" type="button">
            <span th:text="${#locale.language == 'vi'} ? 'Ngôn ngữ' : 'Language'"></span>
            <i class="fa fa-caret-down"></i>
          </button>

          <div class="language-submenu" id="languageMenu">
            <div class="language-item" onclick="changeLang('en')">
              <span class="fi fi-gb"></span> English
            </div>

            <div class="language-item" onclick="changeLang('vi')">
              <span class="fi fi-vn"></span> Tiếng Việt
            </div>
          </div>
        </li>
        <li class="nav-item-flag">
          <span
            id="currentFlag"
            th:class="'fi ' + (${#locale.language} == 'vi' ? 'fi-vn' : 'fi-gb')"
            style="font-size: 18px"
          ></span>
        </li>

        <li class="nav-item-theme">
          <button
            class="account-btn theme-toggle-btn"
            id="themeToggleBtn"
            type="button"
            aria-pressed="false"
          >
            <i class="fa fa-moon" id="themeToggleIcon"></i>
            <span id="themeToggleText">Dark</span>
          </button>
        </li>

        <li class="notification-menu nav-item-compact" sec:authorize="isAuthenticated()">
          <button
            class="account-btn notification-btn"
            id="notificationBtn"
            type="button"
            aria-expanded="false"
            aria-label="Notifications"
          >
            <i class="fa fa-bell"></i>
            <span class="notification-badge hidden" id="notificationBadge">0</span>
          </button>
          <div class="notification-dropdown" id="notificationDropdown">
            <div class="notification-header">
              <span>Notifications</span>
              <button type="button" class="notification-clear-btn" id="notificationClearBtn">
                Clear
              </button>
            </div>
            <div class="notification-list" id="notificationList"></div>
            <div class="notification-empty" id="notificationEmpty">
              No notifications yet.
            </div>
          </div>
        </li>

        <li sec:authorize="isAnonymous()">
          <a
            th:href="@{/auth/login}"
            th:text="${#locale.language == 'vi'} ? 'Đăng nhập' : 'Login'"
            class="nav-link"
          ></a>
        </li>

        <li class="account-menu nav-item-account" sec:authorize="isAuthenticated()">
          <button
            class="account-btn"
            id="accountBtn"
            type="button"
            aria-expanded="false"
          >
            <span class="account-avatar">👤</span>
            <span
              class="account-text"
              th:text="${#locale.language == 'vi'} ? 'Tài khoản' : 'My Account'"
            ></span>
            <i class="fa fa-caret-down"></i>
          </button>
          <div class="account-dropdown" id="accountDropdown">
            <a th:href="@{/profile}" class="dropdown-link">
              <i class="fa fa-user"></i>
              <span th:text="${#locale.language == 'vi'} ? 'Hồ sơ' : 'Profile'"></span>
            </a>

            <form th:action="@{/logout}" method="post" class="dropdown-form">
              <button class="dropdown-link logout-btn" type="submit">
                <i class="fa fa-sign-out"></i>
                <span th:text="${#locale.language == 'vi'} ? 'Đăng xuất' : 'Logout'"></span>
              </button>
            </form>
          </div>
        </li>
      </ul>
    </nav>
  </header>

  <script th:inline="javascript">
    const CUSTOMER_THEME_STORAGE_KEY = "customerTheme";
    const accountBtn = document.getElementById("accountBtn");
    const accountDropdown = document.getElementById("accountDropdown");
    const languageBtn = document.getElementById("languageBtn");
    const languageMenu = document.getElementById("languageMenu");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const themeToggleIcon = document.getElementById("themeToggleIcon");
    const themeToggleText = document.getElementById("themeToggleText");
    const notificationBtn = document.getElementById("notificationBtn");
    const notificationDropdown = document.getElementById("notificationDropdown");
    const notificationBadge = document.getElementById("notificationBadge");
    const notificationList = document.getElementById("notificationList");
    const notificationEmpty = document.getElementById("notificationEmpty");
    const notificationClearBtn = document.getElementById("notificationClearBtn");

    const NOTIFICATION_STORAGE_KEY = "gravity.notifications";
    const NOTIFICATION_AUTO_OPEN_KEY = "gravity.notifications.autoOpen";
    const MAX_NOTIFICATIONS = 10;

    function getStoredCustomerTheme() {
      return localStorage.getItem(CUSTOMER_THEME_STORAGE_KEY) === "dark" ? "dark" : "light";
    }

    function syncThemeControls(theme) {
      const isDark = theme === "dark";
      themeToggleBtn?.classList.toggle("is-dark", isDark);
      themeToggleBtn?.setAttribute("aria-pressed", isDark ? "true" : "false");

      if (themeToggleIcon) {
        themeToggleIcon.className = isDark ? "fa fa-sun" : "fa fa-moon";
      }

      if (themeToggleText) {
        themeToggleText.textContent = isDark ? "Light" : "Dark";
      }
    }

    function shouldUseCustomerStarfield() {
      return !document.body.classList.contains("gravity-news-body")
        && !document.body.classList.contains("gravity-news-detail-body");
    }

    function removeCustomerStarfield() {
      if (window.gravityStarfieldTimer) {
        window.clearInterval(window.gravityStarfieldTimer);
        window.gravityStarfieldTimer = null;
      }
      document.getElementById("gravityStarfield")?.remove();
    }

    function twinkleCustomerStars(starfield) {
      const stars = Array.from(starfield.querySelectorAll(".gravity-star"));
      if (!stars.length) return;

      if (window.gravityStarfieldTimer) {
        window.clearInterval(window.gravityStarfieldTimer);
      }

      window.gravityStarfieldTimer = window.setInterval(() => {
        const flashCount = Math.max(2, Math.floor(stars.length * 0.025));

        for (let i = 0; i < flashCount; i += 1) {
          const star = stars[Math.floor(Math.random() * stars.length)];
          star.classList.add("is-bright");

          window.setTimeout(() => {
            star.classList.remove("is-bright");
          }, Math.random() * 900 + 700);
        }
      }, 850);
    }

    function syncCustomerStarfield(isDark) {
      if (!isDark || !shouldUseCustomerStarfield()) {
        removeCustomerStarfield();
        return;
      }

      if (document.getElementById("gravityStarfield")) {
        return;
      }

      const starfield = document.createElement("div");
      starfield.id = "gravityStarfield";
      starfield.className = "gravity-starfield";

      const starCount = Math.min(150, Math.max(80, Math.floor(window.innerWidth / 9)));
      for (let i = 0; i < starCount; i += 1) {
        const star = document.createElement("span");
        const size = Math.random() * 2.8 + 1.2;
        star.className = "gravity-star";
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        starfield.appendChild(star);
      }

      document.body.prepend(starfield);
      twinkleCustomerStars(starfield);
    }

    function applyCustomerTheme(theme) {
      const resolvedTheme = theme === "dark" ? "dark" : "light";
      const isDark = resolvedTheme === "dark";

      document.documentElement.setAttribute("data-customer-theme", resolvedTheme);
      document.body.classList.toggle("customer-theme-dark", isDark);
      document.body.classList.toggle("profile-theme-dark", isDark);
      localStorage.setItem(CUSTOMER_THEME_STORAGE_KEY, resolvedTheme);
      syncThemeControls(resolvedTheme);
      syncCustomerStarfield(isDark);

      window.dispatchEvent(
        new CustomEvent("customer-theme-change", { detail: { theme: resolvedTheme } })
      );
    }

    window.CustomerTheme = {
      get: getStoredCustomerTheme,
      set: applyCustomerTheme,
      init() {
        applyCustomerTheme(getStoredCustomerTheme());
      },
    };

    window.CustomerTheme.init();

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function readNotifications() {
      try {
        const raw = localStorage.getItem(NOTIFICATION_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.error("Failed to read notifications", error);
        return [];
      }
    }

    function writeNotifications(notifications) {
      localStorage.setItem(
        NOTIFICATION_STORAGE_KEY,
        JSON.stringify(notifications.slice(0, MAX_NOTIFICATIONS))
      );
    }

    function formatNotificationAmount(amount) {
      return `${Number(amount || 0).toLocaleString("vi-VN")} VND`;
    }

    function formatNotificationDateTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("vi-VN", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
      });
    }

    function shortenGroupCode(groupCode) {
      if (!groupCode) return "N/A";
      return String(groupCode).slice(0, 8).toUpperCase();
    }

    function renderNotifications() {
      if (!notificationList || !notificationEmpty || !notificationBadge) {
        return;
      }

      const notifications = readNotifications();
      const unreadCount = notifications.filter((item) => !item.read).length;

      notificationBadge.textContent = unreadCount > 99 ? "99+" : String(unreadCount);
      notificationBadge.classList.toggle("hidden", unreadCount === 0);

      if (!notifications.length) {
        notificationList.innerHTML = "";
        notificationEmpty.classList.remove("hidden");
        return;
      }

      notificationEmpty.classList.add("hidden");
      notificationList.innerHTML = notifications
        .map(
          (item) => `
            <article class="notification-item ${item.read ? "" : "is-unread"}">
              <div class="notification-icon">
                <i class="fa fa-bed"></i>
              </div>
              <div class="notification-content">
                <strong>${escapeHtml(item.title || "Booking created successfully")}</strong>
                <p>${escapeHtml(item.message || "")}</p>
                <div class="notification-meta">
                  <span>${escapeHtml(item.codeLabel || "")}</span>
                  <time>${escapeHtml(formatNotificationDateTime(item.createdAt))}</time>
                </div>
                <div class="notification-amount">${escapeHtml(
                  formatNotificationAmount(item.amount)
                )}</div>
              </div>
            </article>
          `
        )
        .join("");
    }

    function markAllNotificationsAsRead() {
      const notifications = readNotifications();
      writeNotifications(notifications.map((item) => ({ ...item, read: true })));
      renderNotifications();
    }

    function addNotification(notification) {
      const notifications = readNotifications();
      notifications.unshift({
        id: notification.id || `${Date.now()}`,
        title: notification.title || "Booking created successfully",
        message: notification.message || "",
        codeLabel: notification.codeLabel || "",
        amount: notification.amount || 0,
        createdAt: notification.createdAt || new Date().toISOString(),
        read: false,
      });
      writeNotifications(notifications);
      renderNotifications();
    }

    function openNotificationsDropdown(markAsRead = true) {
      if (!notificationBtn || !notificationDropdown) {
        return;
      }

      notificationDropdown.classList.add("show");
      notificationBtn.setAttribute("aria-expanded", "true");
      accountDropdown?.classList.remove("show");
      accountBtn?.setAttribute("aria-expanded", "false");
      languageMenu?.classList.remove("show");

      if (markAsRead) {
        markAllNotificationsAsRead();
      }
    }

    window.GravityNotifications = {
      addBookingSuccessNotification(payload) {
        if (!payload) return;

        const roomCount = Number(payload.roomCount || 0);
        const bookingLabel = roomCount === 1 ? "1 room" : `${roomCount} room(s)`;

        addNotification({
          title: "Booking created successfully",
          message: `Your booking for ${bookingLabel} from ${payload.checkIn} to ${payload.checkOut} was recorded successfully.`,
          codeLabel: `Code: ${shortenGroupCode(payload.groupCode)} | ${payload.status || "UNPAID"}`,
          amount: payload.totalAmount || 0,
          createdAt: payload.createdAt,
        });
      },
      render: renderNotifications,
    };

    renderNotifications();

    themeToggleBtn?.addEventListener("click", () => {
      applyCustomerTheme(getStoredCustomerTheme() === "dark" ? "light" : "dark");
    });

    window.addEventListener("storage", (event) => {
      if (event.key === CUSTOMER_THEME_STORAGE_KEY) {
        applyCustomerTheme(event.newValue === "dark" ? "dark" : "light");
      }
    });

    if (sessionStorage.getItem(NOTIFICATION_AUTO_OPEN_KEY) === "true") {
      sessionStorage.removeItem(NOTIFICATION_AUTO_OPEN_KEY);
      window.setTimeout(() => {
        openNotificationsDropdown(true);
      }, 350);
    }

    document.addEventListener("click", (e) => {
      // ===== ACCOUNT =====
      if (accountBtn && accountDropdown) {
        if (accountBtn.contains(e.target)) {
          e.stopPropagation();
          accountDropdown.classList.toggle("show");

          const expanded = accountBtn.getAttribute("aria-expanded") === "true";
          accountBtn.setAttribute("aria-expanded", expanded ? "false" : "true");

          // đóng language nếu mở
          languageMenu?.classList.remove("show");
          notificationDropdown?.classList.remove("show");
          notificationBtn?.setAttribute("aria-expanded", "false");
        } else if (!accountDropdown.contains(e.target)) {
          accountDropdown.classList.remove("show");
          accountBtn.setAttribute("aria-expanded", "false");
        }
      }

      // ===== LANGUAGE =====
      if (languageBtn && languageMenu) {
        if (languageBtn.contains(e.target)) {
          e.stopPropagation();
          languageMenu.classList.toggle("show");

          // đóng account nếu mở
          accountDropdown?.classList.remove("show");
          notificationDropdown?.classList.remove("show");
          notificationBtn?.setAttribute("aria-expanded", "false");
        } else if (!languageMenu.contains(e.target)) {
          languageMenu.classList.remove("show");
        }
      }
      if (notificationBtn && notificationDropdown) {
        if (notificationBtn.contains(e.target)) {
          e.stopPropagation();
          const expanded =
            notificationBtn.getAttribute("aria-expanded") === "true";
          if (expanded) {
            notificationDropdown.classList.remove("show");
            notificationBtn.setAttribute("aria-expanded", "false");
          } else {
            openNotificationsDropdown(true);
          }
        } else if (!notificationDropdown.contains(e.target)) {
          notificationDropdown.classList.remove("show");
          notificationBtn.setAttribute("aria-expanded", "false");
        }
      }
    });

    notificationClearBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      writeNotifications([]);
      renderNotifications();
    });

    window.addEventListener("storage", (event) => {
      if (event.key === NOTIFICATION_STORAGE_KEY) {
        renderNotifications();
      }
    });

    function changeLang(lang) {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.location.href = url.toString();
    }
  </script>
</div>
