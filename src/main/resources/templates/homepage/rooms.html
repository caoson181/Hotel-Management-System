<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Hotel - Room Collection</title>

  <link rel="stylesheet" href="/css/homepage.css" />
  <link rel="stylesheet" th:href="@{/css/room-homepage.css}" />
  <link rel="stylesheet" th:href="@{/css/customer-footer.css}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css" />
</head>

<body class="rooms-page">
  <div th:replace="~{homepage/navbar :: navbar}"></div>

  <section class="rooms-hero" data-aos="fade-down">
    <div class="hero-content">
      <h1 class="typing-effect" th:text="#{room.hero.title}">
        Discover Your Perfect Stay
      </h1>
      <p th:text="#{room.hero.desc}">
        Five distinct categories • Fifteen unique experiences
      </p>
    </div>
  </section>

  <div class="container" style="padding-top: 130px">
    <div class="rank-progress-bar">
      <div class="rank-progress-fill"></div>
    </div>

    <div class="rank-badge-vertical">
      <div class="rank-dot" data-rank="standard"></div>
      <div class="rank-dot" data-rank="superior"></div>
      <div class="rank-dot" data-rank="deluxe"></div>
      <div class="rank-dot" data-rank="executive"></div>
      <div class="rank-dot" data-rank="suite"></div>
    </div>

    <div class="rooms-container"></div>
  </div>

  <div class="comparison-toolbar">
    <button class="compare-btn" id="toggleCompare">
      <i class="fas fa-balance-scale"></i>
      <span th:text="#{room.compare}">Compare Rooms</span>
      <span class="compare-count">(0)</span>
    </button>
  </div>

  <div class="cart-toolbar" sec:authorize="isAuthenticated()">
    <button class="cart-toggle-btn" id="toggleCart">
      <i class="fas fa-calendar-check"></i>
      <span>Booking</span>
      <span class="cart-count">(0)</span>
    </button>
  </div>

  <div class="comparison-modal">
    <div class="comparison-content">
      <h3>
        <i class="fas fa-balance-scale"></i>
        <span th:text="#{room.compare}">Compare Rooms</span>
      </h3>
      <button class="close-compare"><i class="fas fa-times"></i></button>
      <div class="comparison-grid" id="comparisonGrid"></div>
      <div class="comparison-actions">
        <button class="btn-clear" th:text="#{room.clear.all}">
          Clear All
        </button>
      </div>
    </div>
  </div>

  <div class="cart-modal" id="cartModal">
    <div class="cart-content">
      <h3>
        <i class="fas fa-calendar-check"></i>
        <span th:text="#{booking.title}">Your Booking</span>
      </h3>
      <button class="close-cart" id="closeCartModal"><i class="fas fa-times"></i></button>
      <div class="cart-grid" id="roomsCartGrid"></div>
      <div class="cart-actions">
        <button class="btn-clear-cart" id="clearRoomsCart" th:text="#{booking.clear}">Clear All</button>
        <button class="btn-pay-primary" id="roomsPayNowBtn" th:text="#{booking.payNow}">Pay Now</button>
        <button class="btn-pay-secondary" id="roomsPayLaterBtn" th:text="#{booking.payLater}">Pay Later</button>
      </div>
    </div>
  </div>

  <footer>
    <p th:text="#{room.footer}">
      © 2026 Gravity Hotel. All rights reserved. | Representative room display
      for easy browsing.
    </p>
  </footer>

  <div th:replace="~{homepage/customer-footer :: customerFooter}"></div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script th:src="@{/js/room-homepage.js}"></script>
  <script>
    const header = document.querySelector(".header");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 50) {
        header.classList.add("scrolled");
      } else {
        header.classList.remove("scrolled");
      }
    });
  </script>
  <div id="page-loading" class="page-loading hidden">
    <div class="loader"></div>
  </div>
</body>

</html>
