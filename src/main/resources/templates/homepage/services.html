<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Services - Gravity Hotel</title>

    <link rel="stylesheet" th:href="@{/css/homepage.css}" />
    <link rel="stylesheet" th:href="@{/css/customer-theme.css}" />
    <link rel="stylesheet" th:href="@{/css/services.css}" />
    <link rel="stylesheet" th:href="@{/css/customer-footer.css}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css"
    />
  </head>

  <body class="light-bg service-navbar-transparent">
    <div th:replace="homepage/navbar :: navbar"></div>

    <section class="service-page-hero service-page-hero-list">
      <div class="service-page-hero-overlay"></div>
      <div class="service-page-hero-content">
        <span class="service-page-hero-label">Gravity Hotel</span>
        <h1>Signature Services & Wellness Spaces</h1>
        <p>
          Discover restorative rituals, leisure facilities, fitness experiences,
          and dining moments designed to make every stay feel more complete.
        </p>
      </div>
    </section>

    <section class="services-page">
      <div class="services-layout">
        <div class="service-sidebar">
          <a
            th:each="item, itemStat : ${services}"
            th:href="'#' + ${item.slug}"
            class="nav-link"
            th:classappend="${itemStat.first} ? ' active' : ''"
            th:text="${item.menuLabel}"
          ></a>
        </div>

        <div class="services-content">
          <div
            th:each="item, itemStat : ${services}"
            th:id="${item.slug}"
            class="service-card"
            th:classappend="${itemStat.index % 2 == 1} ? ' reverse' : ''"
          >
            <div class="service-image service-image-link">
              <a th:href="@{/services/{slug}(slug=${item.slug})}">
                <img th:src="${item.coverImage}" th:alt="${item.title}" />
                <div
                  class="service-image-overlay"
                  th:classappend="${itemStat.index % 2 == 1} ? ' is-reverse' : ''"
                >
                  <i
                    th:class="${itemStat.index % 2 == 1} ? 'fas fa-arrow-left' : 'fas fa-arrow-right'"
                  ></i>
                  <span>View Details</span>
                </div>
              </a>
            </div>
            <div class="service-info">
              <h2 th:text="${item.title}"></h2>
              <p th:text="${item.description}"></p>
              <div class="service-features">
                <div th:each="feature : ${item.features}">
                  <i class="fas fa-check-circle"></i>
                  <span th:text="${feature}"></span>
                </div>
              </div>
              <a
                class="service-cta service-detail-link"
                th:href="@{/services/{slug}(slug=${item.slug})}"
              >
                <i class="fas fa-info-circle"></i>
                <span th:text="${item.highlight}"></span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div th:replace="~{homepage/customer-footer :: customerFooter}"></div>

    <script src="/js/services.js"></script>
  </body>
</html>
