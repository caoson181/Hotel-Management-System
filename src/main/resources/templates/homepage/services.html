<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Services - Gravity Hotel</title>

    <link rel="stylesheet" th:href="@{/css/homepage.css}" />
    <link rel="stylesheet" th:href="@{/css/services.css}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css"
    />
  </head>

  <body class="light-bg">
    <div th:replace="homepage/navbar :: navbar"></div>

    <section class="services-page">
      <div class="services-layout">
        <!-- Sidebar -->
        <div class="service-sidebar">
          <a href="#spa" class="nav-link active" th:text="#{service.spa}"></a>
          <a href="#pool" class="nav-link" th:text="#{service.pool}"></a>
          <a href="#gym" class="nav-link" th:text="#{service.gym}"></a>
          <a
            href="#restaurant"
            class="nav-link"
            th:text="#{service.restaurant}"
          ></a>
        </div>

        <!-- Content -->
        <div class="services-content">
          <div id="spa" class="service-card">
            <div class="service-image">
              <img th:src="@{/images/slide1.jpg}" alt="Spa" />
            </div>
            <div class="service-info">
              <h2 th:text="#{service.title1}"></h2>
              <p th:text="#{service.info1}"></p>
              <div class="service-features">
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature1.1}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature1.2}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature1.3}"></span>
                </div>
              </div>
              <div class="service-cta">
                <i class="fas fa-info-circle"></i>
                <span th:text="#{service.cta1}"></span>
              </div>
            </div>
          </div>

          <div id="pool" class="service-card reverse">
            <div class="service-image">
              <img th:src="@{/images/slide2.jpg}" alt="Pool" />
            </div>
            <div class="service-info">
              <h2 th:text="#{service.title2}"></h2>
              <p th:text="#{service.info2}"></p>
              <div class="service-features">
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature2.1}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature2.2}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature2.3}"></span>
                </div>
              </div>
              <div class="service-cta">
                <i class="fas fa-info-circle"></i>
                <span th:text="#{service.cta2}"></span>
              </div>
            </div>
          </div>

          <div id="gym" class="service-card">
            <div class="service-image">
              <img th:src="@{/images/slide6.jpg}" alt="Gym" />
            </div>
            <div class="service-info">
              <h2 th:text="#{service.title3}"></h2>
              <p th:text="#{service.info3}"></p>
              <div class="service-features">
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature3.1}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature3.2}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature3.3}"></span>
                </div>
              </div>
              <div class="service-cta">
                <i class="fas fa-info-circle"></i>
                <span th:text="#{service.cta3}"></span>
              </div>
            </div>
          </div>

          <div id="restaurant" class="service-card reverse">
            <div class="service-image">
              <img th:src="@{/images/slide4.jpg}" alt="Restaurant" />
            </div>
            <div class="service-info">
              <h2 th:text="#{service.title4}"></h2>
              <p th:text="#{service.info4}"></p>
              <div class="service-features">
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature4.1}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature4.2}"></span>
                </div>
                <div>
                  <i class="fas fa-check-circle"></i>
                  <span th:text="#{service.feature4.3}"></span>
                </div>
              </div>
              <div class="service-cta">
                <i class="fas fa-info-circle"></i>
                <span th:text="#{service.cta4}"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <p th:text="#{footer.copy}"></p>
      </div>
    </footer>

    <script src="/js/services.js"></script>
  </body>
</html>
