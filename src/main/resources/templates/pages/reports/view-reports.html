<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>View Room Status</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/modal.css}" />
  <link rel="stylesheet" th:href="@{/css/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/profile.css}" />
  <link rel="stylesheet" th:href="@{/css/view-report.css}" />
</head>

<body>
  <div id="navbar-container" th:replace="~{components/navbar :: navbar}"></div>

  <!-- PAGE CONTENT -->

  <div class="report-summary">

    <div class="summary-card positive">
      <div class="icon">👍</div>
      <div class="info">
        <span class="label">Positive</span>
        <span class="value" th:text="${#numbers.formatDecimal(posPercent,1,1)} + '%'"></span>
      </div>
    </div>

    <div class="summary-card negative">
      <div class="icon">👎</div>
      <div class="info">
        <span class="label">Negative</span>
        <span class="value" th:text="${#numbers.formatDecimal(negPercent,1,1)} + '%'"></span>
      </div>
    </div>

    <div class="summary-card neutral">
      <div class="icon">😐</div>
      <div class="info">
        <span class="label">Neutral</span>
        <span class="value" th:text="${#numbers.formatDecimal(neuPercent,1,1)} + '%'"></span>
      </div>
    </div>

  </div>

  <section class="report-container">

    <h2>Customer Feedback</h2>

    <table class="report-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Subject</th>
          <th>Message</th>
          <th>Date</th>
          <th>Sentiment</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="c : ${customerContacts}" th:classappend="${c.sentiment} == 'Negative' ? 'row-negative'">
          <td th:text="${c.contactId}"></td>
          <td th:text="${c.customer.user.fullName}"></td>
          <td th:text="${c.customer.user.email}"></td>
          <td th:text="${c.subject}"></td>
          <td th:text="${c.message}"></td>
          <td th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span th:text="${c.sentiment}" th:class="'sentiment-badge ' + 
      (${c.sentiment} == 'Positive' ? 'positive' : 
      (${c.sentiment} == 'Negative' ? 'negative' : 'neutral'))">
            </span>
          </td>
        </tr>
      </tbody>
    </table>

    <h2>Guest Feedback</h2>

    <table class="report-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Guest Name</th>
          <th>Guest Email</th>
          <th>Subject</th>
          <th>Message</th>
          <th>Date</th>
          <th>Sentiment</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="c : ${guestContacts}" th:classappend="${c.sentiment} == 'Negative' ? 'row-negative'">
          <td th:text="${c.contactId}"></td>
          <td th:text="${c.guestName}"></td>
          <td th:text="${c.guestEmail}"></td>
          <td th:text="${c.subject}"></td>
          <td th:text="${c.message}"></td>
          <td th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span th:text="${c.sentiment}" th:class="'sentiment-badge ' + 
      (${c.sentiment} == 'Positive' ? 'positive' : 
      (${c.sentiment} == 'Negative' ? 'negative' : 'neutral'))">
            </span>
          </td>
        </tr>
      </tbody>
    </table>

  </section>

  <!-- MODALS -->
  <div th:replace="~{components/modals :: modals}"></div>

  <script th:src="@{/js/main.js}"></script>
  <script th:src="@{/js/account.js}"></script>
  <script th:src="@{/js/dropdown.js}"></script>
  <script th:src="@{/js/role.js}"></script>
</body>

</html>
