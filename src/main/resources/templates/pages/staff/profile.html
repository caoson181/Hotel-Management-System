<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Staff Profile</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/modal.css}" />
    <link rel="stylesheet" th:href="@{/css/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/profile-staff-v2.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div id="editProfileModal" class="modal profile-modal">
        <div class="modal-overlay"></div>

        <div class="modal-box">
            <button class="close-btn" id="closeEditModal">&times;</button>

            <h2>Edit Profile</h2>
            <p class="subtitle">Update your personal information</p>

            <form th:action="@{/staff/profile/manage/update}" method="post">

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" th:value="${user.username}" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" th:value="${user.fullName}" required />
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender">
                            <option value="Male" th:selected="${user.gender == 'Male'}">Male</option>
                            <option value="Female" th:selected="${user.gender == 'Female'}">Female</option>
                            <option value="Other" th:selected="${user.gender == 'Other'}">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dateOfBirth"
                            th:value="${#temporals.format(user.dateOfBirth, 'yyyy-MM-dd')}" />
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" th:value="${user.email}" disabled />
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" th:value="${user.phoneNumber}" disabled />
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn cancel" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- NAVBAR -->
    <div th:replace="~{components/navbar :: navbar}"></div>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-topbar">
                <div class="profile-topbar-copy">
                    <span class="profile-eyebrow">Staff Workspace</span>
                    <h1>Profile Overview</h1>
                    <p>Keep your staff information updated for smoother internal operations.</p>
                </div>
                <button id="openEditModal" class="btn primary profile-topbar-btn">
                    <i class="fas fa-pen"></i>
                    <span>Edit Profile</span>
                </button>
            </div>

            <!-- AVATAR -->
            <div class="profile-header">
                <div id="openAvatarModal" style="cursor:pointer;">
                    <div class="avatar">
                        <img th:if="${avatar != null}" th:src="${avatar.url}" />
                        <span th:if="${avatar == null}" th:text="${#strings.substring(user.username,0,1)}"></span>
                    </div>
                </div>

                <div class="avatar-gallery avatar-popup" id="avatarModal">
                    <form th:action="@{/staff/profile/avatar/upload}" method="post" enctype="multipart/form-data">
                        <label class="avatar-upload">
                            ⬆
                            <input type="file" name="file" hidden onchange="this.form.submit()" />
                        </label>
                    </form>
                    <form th:each="ava : ${avatars}" th:action="@{/staff/profile/manage/avatar/select}" method="post">

                        <input type="hidden" name="avatarId" th:value="${ava.id}" />

                        <button type="submit" class="avatar-item" th:classappend="${ava.current} ? 'active'">

                            <img th:src="${ava.url}" />

                        </button>
                    </form>
                </div>

                <div>
                    <h2 th:text="${user.fullName}">Full Name</h2>
                    <p class="role" th:text="${user.role}">Role</p>
                    <div class="profile-header-meta">
                        <span class="profile-badge"><i class="fas fa-user-shield"></i> Staff account</span>
                        <span class="profile-meta-item"><i class="fas fa-envelope"></i><span th:text="${user.email}"></span></span>
                    </div>
                </div>
            </div>

            <div class="profile-highlights">
                <article class="highlight-card">
                    <span class="highlight-label">Username</span>
                    <strong th:text="${user.username}"></strong>
                </article>
                <article class="highlight-card">
                    <span class="highlight-label">Phone</span>
                    <strong th:text="${user.phoneNumber != null ? user.phoneNumber : 'Not set'}"></strong>
                </article>
                <article class="highlight-card">
                    <span class="highlight-label">Date of Birth</span>
                    <strong th:text="${user.dateOfBirth != null ? #temporals.format(user.dateOfBirth, 'dd/MM/yyyy') : 'Not set'}"></strong>
                </article>
            </div>

            <!-- INFO GRID -->
            <div class="profile-grid">

                <div class="info-item">
                    <label>Username</label>
                    <span th:text="${user.username}"></span>
                </div>

                <div class="info-item">
                    <label>Gender</label>
                    <span th:text="${user.gender}"></span>
                </div>

                <div class="info-item">
                    <label>Date of Birth</label>
                    <span th:text="${#temporals.format(user.dateOfBirth, 'dd/MM/yyyy')}"></span>
                </div>

                <div class="info-item">
                    <label>Email</label>
                    <span th:text="${user.email}"></span>
                </div>

                <div class="info-item">
                    <label>Phone</label>
                    <span th:text="${user.phoneNumber}"></span>
                </div>

            </div>

            <!-- ACTION -->
            <div class="profile-actions">
                <a th:href="@{/index}" class="btn secondary">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back</span>
                </a>
                <button id="openEditModalBottom" class="btn primary">
                    <i class="fas fa-pen"></i>
                    <span>Edit Profile</span>
                </button>
            </div>

        </div>
    </div>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/account.js}"></script>
    <script th:src="@{/js/dropdown.js}"></script>
    <script th:src="@{/js/role.js}"></script>
    <div th:replace="~{components/modals :: modals}"></div>
    <script>
        const editModal = document.getElementById("editProfileModal");
        const openEditModalBtn = document.getElementById("openEditModal");
        const openEditModalBottomBtn = document.getElementById("openEditModalBottom");
        const closeEditModalBtn = document.getElementById("closeEditModal");
        const cancelEditBtn = document.getElementById("cancelEdit");
        const editModalOverlay = document.querySelector("#editProfileModal .modal-overlay");

        function openStaffEditModal() {
            if (editModal) {
                editModal.classList.add("active");
            }
        }

        function closeStaffEditModal() {
            if (editModal) {
                editModal.classList.remove("active");
            }
        }

        openEditModalBtn?.addEventListener("click", openStaffEditModal);
        openEditModalBottomBtn?.addEventListener("click", openStaffEditModal);
        closeEditModalBtn?.addEventListener("click", closeStaffEditModal);
        cancelEditBtn?.addEventListener("click", closeStaffEditModal);
        editModalOverlay?.addEventListener("click", closeStaffEditModal);

        const avatarBtn = document.getElementById("openAvatarModal");
        const avatarModal = document.getElementById("avatarModal");

        avatarBtn.onclick = (e) => {
            e.stopPropagation();
            avatarModal.classList.toggle("active");
        };

        document.addEventListener("click", () => {
            avatarModal.classList.remove("active");
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeStaffEditModal();
                avatarModal.classList.remove("active");
            }
        });
    </script>
</body>

</html>
