<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Staff Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background-color: #f5f7fa;
            font-family: Arial, sans-serif;
        }
.profile-container {
    max-width: 600px;
    margin: 60px auto;
}

.profile-card {
    background: #fff;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
}

.profile-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #ddd;
    margin: 0 auto 15px;
}

.profile-name {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 5px;
}

.profile-role {
    color: #888;
    margin-bottom: 20px;
}

.profile-info {
    text-align: left;
    margin-top: 20px;
}

.profile-info p {
    margin: 8px 0;
    font-size: 15px;
}

.label {
    font-weight: bold;
    color: #333;
}

.back-btn {
    margin-top: 25px;
    display: inline-block;
    padding: 8px 16px;
    border-radius: 6px;
    background: #007bff;
    color: white;
    text-decoration: none;
}

.back-btn:hover {
    background: #0056b3;
}
</style>

</head>
<body>
<div class="profile-container">
    <div class="profile-card"> <div class="profile-avatar"></div>
        <div class="profile-name" th:text="${user.fullName}">Full Name</div>
        <div class="profile-role" th:text="${user.role}">Role</div>
        <div class="profile-info"> <p>
            <span class="label">Username:</span>
            <span th:text="${user.username}"></span>
        </p>
            <p>
                <span class="label">Email:</span>
                <span th:text="${user.email}"></span></p>
            <p>
                <span class="label">Phone:</span>
                <span th:text="${user.phoneNumber}"></span>
            </p>

        </div>
    <a th:href="@{/index}" class="back-btn">Back</a>

</div> </div> </body> </html>
