<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>View Staff</title>

    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/modal.css}" />
    <link rel="stylesheet" th:href="@{/css/profile.css}" />
    <link rel="stylesheet" th:href="@{/css/view-staff.css}" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <div
      id="navbar-container"
      th:replace="~{components/navbar :: navbar}"
    ></div>
    <h1>Staff List</h1>

    <div class="search-box">
      <form th:action="@{/staff/view}" method="get">
        <input
          type="text"
          name="keyword"
          th:value="${keyword}"
          placeholder="Search staff name..."
        />
        <button type="submit">Search</button>
      </form>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Gender</th>
          <th>Role</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="staff : ${staffList}">
          <td th:text="${staff.id}"></td>
          <td th:text="${staff.fullName}"></td>
          <td th:text="${staff.email}"></td>
          <td th:text="${staff.phoneNumber}"></td>
          <td th:text="${staff.gender}"></td>
          <td th:text="${staff.role}"></td>

          <td>
            <span th:if="${staff.enabled}" class="status-active">Active</span>
            <span th:unless="${staff.enabled}" class="status-disabled"
              >Disabled</span
            >
          </td>
        </tr>
      </tbody>
    </table>

    <div class="pagination">
      <a
        th:if="${currentPage > 0}"
        th:href="@{/staff/view(page=${currentPage-1}, keyword=${keyword})}"
      >
        Previous
      </a>

      <span th:text="${currentPage + 1}"></span>
      /
      <span th:text="${totalPages}"></span>

      <a
        th:if="${currentPage < totalPages - 1}"
        th:href="@{/staff/view(page=${currentPage+1}, keyword=${keyword})}"
      >
        Next
      </a>
    </div>
    <div th:replace="~{components/modals :: modals}"></div>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/account.js}"></script>
    <script th:src="@{/js/dropdown.js}"></script>
    <script th:src="@{/js/role.js}"></script>
  </body>
</html>
