<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>View Staff</title>

  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/modal.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
  <style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
        font-family: Arial, sans-serif;
        background:#f5f6fa;
        margin:0;
        padding:30px;
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    .search-box{
        text-align:center;
        margin-bottom:20px;
    }

    input[type="text"]{
        padding:8px;
        width:250px;
        border-radius:4px;
        border:1px solid #ccc;
    }

    button{
        padding:8px 15px;
        border:none;
        background:#3498db;
        color:white;
        border-radius:4px;
        cursor:pointer;
    }

    button:hover{
        background:#2980b9;
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:white;
    }

    th, td{
        padding:12px;
        border-bottom:1px solid #ddd;
        text-align:left;
    }

    th{
        background:#2c3e50;
        color:white;
    }

    tr:hover{
        background:#f2f2f2;
    }

    .status-active{
        color:green;
        font-weight:bold;
    }

    .status-disabled{
        color:red;
        font-weight:bold;
    }

    .pagination{
        text-align:center;
        margin-top:20px;
    }

    .pagination a{
        padding:6px 12px;
        margin:2px;
        border:1px solid #ccc;
        text-decoration:none;
        color:#333;
    }

    .pagination a:hover{
        background:#3498db;
        color:white;
    }

  </style>
</head>

<body>
<div id="navbar-container" th:replace="~{components/navbar :: navbar}"></div>
<h1>Staff List</h1>

<div class="search-box">
  <form th:action="@{/staff/view}" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search staff name...">
    <button type="submit">Search</button>
  </form>
</div>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Full Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Gender</th>
    <th>Role</th>
    <th>Status</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="staff : ${staffList}">
    <td th:text="${staff.id}"></td>
    <td th:text="${staff.fullName}"></td>
    <td th:text="${staff.email}"></td>
    <td th:text="${staff.phoneNumber}"></td>
    <td th:text="${staff.gender}"></td>
    <td th:text="${staff.role}"></td>

    <td>
      <span th:if="${staff.enabled}" class="status-active">Active</span>
      <span th:unless="${staff.enabled}" class="status-disabled">Disabled</span>
    </td>
  </tr>
  </tbody>
</table>

<div class="pagination">

  <a th:if="${currentPage > 0}"
     th:href="@{/staff/view(page=${currentPage-1}, keyword=${keyword})}">
    Previous
  </a>

  <span th:text="${currentPage + 1}"></span>
  /
  <span th:text="${totalPages}"></span>

  <a th:if="${currentPage < totalPages - 1}"
     th:href="@{/staff/view(page=${currentPage+1}, keyword=${keyword})}">
    Next
  </a>

</div>

</body>
</html>
