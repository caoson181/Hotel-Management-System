<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Customer Management</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/modal.css}" />
    <link rel="stylesheet" th:href="@{/css/profile.css}" />
    <link rel="stylesheet" th:href="@{/css/manage-users.css}" />
  </head>

  <body>
    <div
      id="navbar-container"
      th:replace="~{components/navbar :: navbar}"
    ></div>
    <h1>Customer Management</h1>

    <div class="search-box">
      <form th:action="@{/users/manage}" method="get">
        <input
          type="text"
          name="keyword"
          th:value="${keyword}"
          placeholder="Search customer name"
        />

        <button type="submit">Search</button>
      </form>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="user : ${userList}">
          <td th:text="${user.id}"></td>
          <td th:text="${user.fullName}"></td>
          <td th:text="${user.email}"></td>
          <td th:text="${user.phoneNumber}"></td>

          <td>
            <span th:if="${user.enabled}" class="status-active">Active</span>
            <span th:unless="${user.enabled}" class="status-disabled"
              >Disabled</span
            >
          </td>

          <td>
            <a
              th:if="${user.enabled}"
              th:href="@{/user/toggle/{id}(id=${user.id})}"
              class="btn btn-disable"
            >
              Disable
            </a>

            <a
              th:unless="${user.enabled}"
              th:href="@{/user/toggle/{id}(id=${user.id})}"
              class="btn btn-enable"
            >
              Enable
            </a>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="pagination">
      <a
        th:if="${currentPage > 0}"
        th:href="@{/users/manage(page=${currentPage-1},keyword=${keyword})}"
      >
        Previous
      </a>

      <span th:text="${currentPage+1}"></span>
      /
      <span th:text="${totalPages}"></span>

      <a
        th:if="${currentPage < totalPages-1}"
        th:href="@{/users/manage(page=${currentPage+1},keyword=${keyword})}"
      >
        Next
      </a>
    </div>

    <div th:replace="~{components/modals :: modals}"></div>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/account.js}"></script>
    <script th:src="@{/js/dropdown.js}"></script>
    <script th:src="@{/js/role.js}"></script>
  </body>
</html>
