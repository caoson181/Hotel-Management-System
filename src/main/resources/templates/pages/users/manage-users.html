<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer Management</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/modal.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">

  <style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    body{
        font-family: Arial, sans-serif;
        background:#f5f6fa;
        margin:0;
        padding:30px;
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    .search-box{
        text-align:center;
        margin-bottom:20px;
    }

    input[type="text"]{
        padding:8px;
        width:250px;
        border-radius:4px;
        border:1px solid #ccc;
    }

    button{
        padding:8px 15px;
        border:none;
        background:#3498db;
        color:white;
        border-radius:4px;
        cursor:pointer;
    }

    button:hover{
        background:#2980b9;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      table-layout:fixed;
    }

    /* Column widths */
    th:nth-child(1), td:nth-child(1){
      width:6%;
    }

    th:nth-child(2), td:nth-child(2){
      width:22%;
    }

    th:nth-child(3), td:nth-child(3){
      width:28%;
    }

    th:nth-child(4), td:nth-child(4){
      width:16%;
    }

    th:nth-child(5), td:nth-child(5){
      width:12%;
      text-align:center;
    }

    th:nth-child(6), td:nth-child(6){
      width:16%;
      text-align:center;
    }

    th, td{
        padding:12px;
        border-bottom:1px solid #ddd;
        text-align:left;
    }

    th{
        background:#2c3e50;
        color:white;
    }

    tr:hover{
        background:#f2f2f2;
    }

    td{
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
    }

    .status-active{
        color:green;
        font-weight:bold;
    }

    .status-disabled{
        color:red;
        font-weight:bold;
    }

    .btn{
        padding:6px 12px;
        border-radius:4px;
        text-decoration:none;
        color:white;
    }

    .btn-disable{
        background:#e74c3c;
    }

    .btn-enable{
        background:#27ae60;
    }

    .btn-disable:hover{
        background:#c0392b;
    }

    .btn-enable:hover{
        background:#1e8449;
    }

    .pagination{
        text-align:center;
        margin-top:20px;
    }

    .pagination a{
        padding:6px 12px;
        margin:2px;
        border:1px solid #ccc;
        text-decoration:none;
        color:#333;
    }

    .pagination a:hover{
        background:#3498db;
        color:white;
    }

    td:nth-child(5),
    td:nth-child(6){
        text-align:center;
    }

  </style>

</head>

<body>
<div id="navbar-container" th:replace="~{components/navbar :: navbar}"></div>
<h1>Customer Management</h1>

<div class="search-box">
  <form th:action="@{/users/manage}" method="get">
    <input type="text" name="keyword"
           th:value="${keyword}"
           placeholder="Search customer name">

    <button type="submit">Search</button>
  </form>
</div>

<table>

  <thead>
  <tr>
    <th>ID</th>
    <th>Full Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
    <th>Action</th>
  </tr>
  </thead>

  <tbody>

  <tr th:each="user : ${userList}">

    <td th:text="${user.id}"></td>
    <td th:text="${user.fullName}"></td>
    <td th:text="${user.email}"></td>
    <td th:text="${user.phoneNumber}"></td>

    <td>
      <span th:if="${user.enabled}" class="status-active">Active</span>
      <span th:unless="${user.enabled}" class="status-disabled">Disabled</span>
    </td>

    <td>

      <a th:if="${user.enabled}"
         th:href="@{/user/toggle/{id}(id=${user.id})}"
         class="btn btn-disable">
        Disable
      </a>

      <a th:unless="${user.enabled}"
         th:href="@{/user/toggle/{id}(id=${user.id})}"
         class="btn btn-enable">
        Enable
      </a>

    </td>

  </tr>

  </tbody>

</table>

<div class="pagination">

  <a th:if="${currentPage > 0}"
     th:href="@{/users/manage(page=${currentPage-1},keyword=${keyword})}">
    Previous
  </a>

  <span th:text="${currentPage+1}"></span>
  /
  <span th:text="${totalPages}"></span>

  <a th:if="${currentPage < totalPages-1}"
     th:href="@{/users/manage(page=${currentPage+1},keyword=${keyword})}">
    Next
  </a>

</div>

</body>
</html>
